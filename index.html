<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7622289621648088"
     crossorigin="anonymous"></script>
    
    <!-- Preconnect to external domains for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Preload critical assets -->
    <link rel="preload" href="/creative-emman-pic.webp" as="image" type="image/webp" />
    
    <!-- Optimized font loading with display=swap -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700&display=swap"
    />
    
    <!-- Primary Meta Tags -->
    <title>Creative Emman | WordPress Developer & Product Designer</title>
    <meta name="title" content="Creative Emman | WordPress Developer & Product Designer" />
    <meta
      name="description"
      content="Portfolio of Creative Emman, a WordPress Developer and Product Designer from Nigeria with over 2 years of experience."
    />
    <meta name="author" content="Creative Emman" />
    <meta name="theme-color" content="#8F0075" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://creative-emman.vercel.app/" />
    <meta property="og:title" content="Creative Emman | WordPress Developer & Product Designer" />
    <meta
      property="og:description"
      content="Portfolio of Creative Emman, a WordPress Developer and Product Designer from Nigeria with over 2 years of experience."
    />
    <meta property="og:image" content="/og-image.webp" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://creative-emman.vercel.app/" />
    <meta name="twitter:title" content="Creative Emman | WordPress Developer & Product Designer" />
    <meta
      name="twitter:description"
      content="Portfolio of Creative Emman, a WordPress Developer and Product Designer from Nigeria with over 2 years of experience."
    />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Inline critical CSS for instant first paint -->
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      body{background:#0a0a0a;color:#fff;font-family:'Rubik',sans-serif}
      #root{min-height:100vh}
      .loading-screen{position:fixed;inset:0;background:#0a0a0a;display:flex;align-items:center;justify-content:center;z-index:9999}
      .loading-spinner{width:40px;height:40px;border:3px solid #222;border-top-color:#8F0075;border-radius:50%;animation:spin 1s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
    </style>
  </head>

  <body>
    <div id="root">
      <!-- Loading screen shown while JS loads -->
      <div class="loading-screen">
        <div class="loading-spinner"></div>
      </div>
    </div>
    
    <!-- IMPORTANT: DO NOT REMOVE THIS SCRIPT TAG OR THIS VERY COMMENT! -->
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module" async></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
